<div *ngFor="let message of messages" [ngClass]="[message.role, message.showThinking ? 'thinking' : '']">
	<app-pngimage-display [images]="message.images" />
	<div *ngIf="!message.showThinking" [innerHTML]="message.content | parseContent"></div>
	<div *ngIf="message.showThinking" [innerHTML]="message.thinking ?? '' | parseContent"></div>
</div>
